<!-- components/cuts-list.html -->
<datalist id="cuts-suggestions"></datalist>

<section class="card section" aria-labelledby="cuts-list-title">
  <div class="section-header">
    <h2 class="section-title" id="cuts-list-title">Cortes</h2>
    <button
      type="button"
      id="add-cut-btn"
      class="btn btn-primary btn-sm btn-add-cut"
      aria-label="Adicionar novo corte"
    >+ Adicionar</button>
  </div>

  <div class="cut-row-header" aria-hidden="true">
    <span class="cut-col-label">Corte</span>
    <span class="cut-col-label">Peso</span>
    <span class="cut-col-label">Preço</span>
    <span class="cut-col-label sr-only">Ações</span>
  </div>

  <div id="cuts-list" class="cuts-list" role="list" aria-label="Lista de cortes"></div>
</section>
