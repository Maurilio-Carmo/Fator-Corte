<datalist id="cuts-suggestions">
  <option value="Filé Mignon">
  <option value="Contra-filé">
  <option value="Alcatra">
  <option value="Coxão Mole">
  <option value="Coxão Duro">
  <option value="Patinho">
  <option value="Lagarto">
  <option value="Capa e Aba">
  <option value="Músculo">
  <option value="Retalhos (Moída)">
  <option value="Acém">
  <option value="Pescoço">
  <option value="Cupim">
  <option value="Peito">
  <option value="Paleta">
  <option value="Músculo Dianteiro">
  <option value="Retalhos Dianteiro">
  <option value="Costela">

</datalist>

<section class="card section" aria-labelledby="cuts-list-title">
  <div class="section-header">
    <h2 class="section-title" id="cuts-list-title">Cortes</h2>
    <button
      type="button"
      id="add-cut-btn"
      class="btn btn-primary btn-sm btn-add-cut"
      aria-label="Adicionar novo corte"
    >+ Adicionar</button>
  </div>

  <div class="cut-row-header" aria-hidden="true">
    <span class="cut-col-label">Corte</span>
    <span class="cut-col-label">Peso</span>
    <span class="cut-col-label">Preço</span>
    <span class="cut-col-label sr-only">Ações</span>
  </div>

  <div id="cuts-list" class="cuts-list" role="list" aria-label="Lista de cortes"></div>
</section>
