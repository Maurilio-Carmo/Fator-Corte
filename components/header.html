<!-- components/header.html -->
<div id="drawer-overlay" class="drawer-overlay"></div>

<aside
  id="settings-panel"
  class="settings-drawer"
  role="dialog"
  aria-label="Configurações"
  aria-modal="true"
  inert
>
  <div class="drawer-header">
    <span class="drawer-title">Configurações</span>
    <button
      type="button"
      id="drawer-close-btn"
      class="btn btn-ghost btn-icon"
      aria-label="Fechar configurações"
    >✕</button>
  </div>

  <div class="drawer-body">
    <div class="settings-group">
      <span class="settings-label" id="label-price-mode">Cálculo do preço mínimo</span>
      <div class="toggle-group" role="group" aria-labelledby="label-price-mode">
        <button type="button" class="toggle-opt active" data-setting="priceMode" data-value="margin">Margem</button>
        <button type="button" class="toggle-opt" data-setting="priceMode" data-value="markup">Markup</button>
      </div>
    </div>

    <div class="settings-group">
      <span class="settings-label" id="label-cost-mode">Distribuição de custo</span>
      <div class="toggle-group" role="group" aria-labelledby="label-cost-mode">
        <button type="button" class="toggle-opt active" data-setting="costMode" data-value="scarcity">Escassez</button>
        <button type="button" class="toggle-opt" data-setting="costMode" data-value="equal">Igualitária</button>
      </div>
    </div>

    <div class="settings-group">
      <span class="settings-label" id="label-input-mode">Entrada por corte</span>
      <div class="toggle-group" role="group" aria-labelledby="label-input-mode">
        <button type="button" class="toggle-opt active" data-setting="inputMode" data-value="price">Preço</button>
        <button type="button" class="toggle-opt" data-setting="inputMode" data-value="per_cut">Porcentagem</button>
      </div>
    </div>
  </div>

  <footer class="drawer-footer" id="drawer-footer"></footer>
</aside>

<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <img class="header-icon" src="icons/icon.svg" alt="" aria-hidden="true" width="48" height="48" />
      <div class="header-titles">
        <h1 class="app-title">Fator de Corte</h1>
        <p class="header-tagline">Calculadora de Rendimento e Custo</p>
      </div>
    </div>
    <div class="header-actions">
      <a
        href="https://maurilio-carmo.github.io/Coffee-Pay/"
        target="_blank"
        rel="noopener noreferrer"
        class="btn btn-support"
        aria-label="Apoiar o projeto"
      >☕ <span class="btn-support-label">Apoiar</span></a>
      <button
        id="settings-btn"
        type="button"
        class="btn btn-ghost btn-icon settings-btn"
        aria-label="Configurações"
        aria-expanded="false"
        aria-controls="settings-panel"
      ></button>
    </div>
  </div>
</header>
