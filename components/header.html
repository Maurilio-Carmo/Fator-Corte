<!-- components/header.html -->
<header class="site-header" role="banner">
  <div class="header-inner">
    <div class="header-brand">
      <img class="header-icon" src="icons/icon.svg" alt="" aria-hidden="true" width="48" height="48" />
      <div class="header-titles">
        <h1 class="app-title">Fator de Corte</h1>
        <p class="header-tagline">Calculadora de Rendimento e Custo</p>
      </div>
    </div>
    <div class="header-actions">
      <button
        id="settings-btn"
        type="button"
        class="btn btn-ghost btn-icon settings-btn"
        aria-label="Configurações"
        aria-expanded="false"
        aria-controls="settings-panel"
      ></button>
      <div id="settings-panel" class="settings-panel hidden" role="dialog" aria-label="Configurações">
        <div class="settings-group">
          <span class="settings-label">Cálculo do preço mínimo</span>
          <div class="toggle-group" role="group">
            <button type="button" class="toggle-opt active" data-setting="priceMode" data-value="margin">Margem</button>
            <button type="button" class="toggle-opt" data-setting="priceMode" data-value="markup">Markup</button>
          </div>
        </div>
        <div class="settings-group">
          <span class="settings-label">Distribuição de custo</span>
          <div class="toggle-group" role="group">
            <button type="button" class="toggle-opt active" data-setting="costMode" data-value="scarcity">Escassez</button>
            <button type="button" class="toggle-opt" data-setting="costMode" data-value="equal">Igualitária</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
