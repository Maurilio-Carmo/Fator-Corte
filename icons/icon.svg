<!-- icons/icon.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1a0e"/>
      <stop offset="100%" stop-color="#1a0f08"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4922a"/>
      <stop offset="100%" stop-color="#f0b940"/>
    </linearGradient>
  </defs>

  <!-- Background — raio 96px para safe area do ícone maskable -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Borda amber sutil -->
  <rect x="10" y="10" width="492" height="492" rx="88"
        fill="none" stroke="#c17f24" stroke-width="6" opacity="0.4"/>

  <!-- Monograma FC -->
  <text
    x="256" y="330"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
    font-weight="700"
    font-size="256"
    fill="url(#fg)"
    letter-spacing="-8"
  >FC</text>

  <!-- Linha decorativa amber abaixo do texto -->
  <rect x="96" y="368" width="320" height="6" rx="3" fill="#c17f24" opacity="0.5"/>

  <!-- Subtexto -->
  <text
    x="256" y="430"
    text-anchor="middle"
    font-family="'Segoe UI', system-ui, sans-serif"
    font-weight="400"
    font-size="48"
    fill="#c8a882"
    letter-spacing="6"
    opacity="0.8"
  >AÇOUGUE</text>
</svg>
